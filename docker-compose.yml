version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./projects:/projects
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ozod

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./projects:/projects:ro
    depends_on:
      - app
    networks:
      - ozod

networks:
  ozod:
    driver: bridge
